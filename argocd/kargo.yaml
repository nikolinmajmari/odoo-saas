apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo
  namespace: argocd
spec:
  project: default
  destination:
    namespace: kargo
    server: https://kubernetes.default.svc
  source:
    repoURL: ghcr.io/akuity/kargo-charts
    chart: kargo
    targetRevision: 1.3.3
    helm:
      parameters:
        - name: api.adminAccount.passwordHash
          # Note: A bcrypt-hashed password will contain `$` characters that
          # MUST each be escaped as `$$`
          # p6LjXDAOtfv4sQ48yjDuVlGlpMp1y1ka
          value: $$2y$$10$$a/wuqfRxaZqddVvz4pP6suIC4tqw0x81JKr0ljEGsGt5hYrNPCdhy
        - name: api.adminAccount.tokenSigningKey
          value: uybVfoueYyUPJHNCExR36XT7YzvNQ04O
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
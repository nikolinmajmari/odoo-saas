apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: saas-1-preview
  namespace: argocd
  labels:
    app.kubernetes.io/name: saas-stagging
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - list:
      elements:
      - cluster: dev
        url: https://kubernetes.default.svc
      - cluster: stagging
        url: https://kubernetes.default.svc
      - cluster: prod
        url: https://kubernetes.default.svc
  template:
    metadata:
      name: 'saas-1-env-{{.name}}-{{.number}}'
    spec:
      destination:
        namespace: 'saas-1-env{{.name}}'
        server: 'https://kubernetes.default.svc'
      project: default
      source:
        repoURL: 'https://github.com/nikolinmajmari/odoo-saas.git'
        targetRevision: HEAD
        path: helm
        helm:
          parameters:
            - name: namespace
              value: 'saas-1-{{.name}}'
            - name: version
              value: 'latest'
            - name: image
              value: odoo_estate
            - name: name
              value: saas
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
